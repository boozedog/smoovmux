# SwiftLint config for smoovmux.
# Pairs with `swift format` (Apple) — formatting rules live there, not here.
# See CLAUDE.md § Formatting for the full toolchain.

included:
  - App
  - Sources
  - Tests

excluded:
  - .build
  - .worktrees
  - ghostty
  - DerivedData

# Disable rules that overlap with `swift format` to avoid conflicts.
disabled_rules:
  - trailing_whitespace
  - opening_brace
  - statement_position
  - colon
  - comma
  - return_arrow_whitespace
  - vertical_whitespace
  - trailing_comma
  - line_length          # swift-format owns line length
  - todo                 # noisy during M1; re-enable post-M1

# Safety + correctness rules. These catch real bugs, not bikeshed style.
opt_in_rules:
  - closure_end_indentation
  - closure_spacing
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - direct_return
  - discouraged_assert
  - discouraged_none_name
  - discouraged_object_literal
  - discouraged_optional_boolean
  - discouraged_optional_collection
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - function_name_whitespace          # renamed from operator_whitespace
  - identical_operands
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - non_overridable_class_declaration
  - operator_usage_whitespace
  - optional_enum_case_matching
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_key_path
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_type_checking
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - private_swiftui_state
  - prohibited_super_call
  - reduce_boolean
  - reduce_into
  - redundant_nil_coalescing
  - redundant_self                    # renamed from redundant_self_in_closure
  - redundant_type_annotation
  - self_binding
  - shorthand_optional_binding
  - single_test_class
  - sorted_first_last
  - sorted_imports
  - static_operator
  - superfluous_else
  - test_case_accessibility
  - toggle_bool
  - unavailable_function
  - unhandled_throwing_task
  - unowned_variable_capture
  - unused_capture_list
  - vertical_parameter_alignment_on_call
  - weak_computed_property
  - weak_delegate
  - xct_specific_matcher
  - yoda_condition

# Analyzer rules — only run by `swiftlint analyze` (needs compilation log).
# We don't run analyzer in pre-commit (slow); leave for CI deep-checks later.
analyzer_rules:
  - unused_declaration
  - unused_import

# Tuned thresholds — defaults are too tight for Swift app code.
function_body_length:
  warning: 80
  error: 150

type_body_length:
  warning: 400
  error: 700

file_length:
  warning: 600
  error: 1200

cyclomatic_complexity:
  warning: 12
  error: 20

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - r
    - g
    - b
    - a

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60

reporter: "xcode"
