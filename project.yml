name: smoovmux
options:
  bundleIdPrefix: pw.dbu
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # Xcode 26 regression: the "Ld" task for SPM Swift modules (a partial
    # link that bundles a module's object files into one .o) builds a
    # clang-driver-style command line but invokes `ld` directly, which
    # rejects flags like `-isysroot`, `-iframework`, `-nostdlib`, and
    # `-fobjc-link-runtime`. Pointing LD at clang lets the driver translate
    # those into real ld flags. Remove once Apple fixes it.
    LD: $(TOOLCHAIN_DIR)/usr/bin/clang

packages:
  smoovmux-core:
    path: "."

targets:
  smoovmux:
    type: application
    platform: macOS
    sources:
      - path: App
    resources:
      - path: App/Assets.xcassets
      - path: App/Localizable.xcstrings
    dependencies:
      - package: smoovmux-core
        product: SessionCore
      - package: smoovmux-core
        product: SmoovLog
      - package: smoovmux-core
        product: SmoovAppCommands
      - package: smoovmux-core
        product: WorkspaceTabs
      # GhosttyKit.xcframework's macOS slice is a static archive
      # (`ghostty-internal.a`). Static archives aren't embedded — the code
      # is linked into the app binary at build time. `embed: false` keeps
      # codesign from choking on a .a file in `Contents/Frameworks/`.
      - framework: GhosttyKit.xcframework
        embed: false
      # libghostty pulls in Carbon for TIS* keyboard-layout introspection.
      - sdk: Carbon.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pw.dbu.smoovmux
        PRODUCT_NAME: smoovmux
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/smoovmux.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        # ghostty-internal.a pulls in glslang (C++). Upstream's Ghostty.app
        # links libstdc++ explicitly — we need the same for libghostty's
        # shader compiler to find std::runtime_error et al.
        OTHER_LDFLAGS: -lstdc++
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)"
    postBuildScripts:
      - name: Embed Ghostty Resources
        # libghostty discovers resources by walking up from the app binary and
        # looking for Contents/Resources/terminfo/78/xterm-ghostty. Once found,
        # it exposes Contents/Resources/ghostty as GHOSTTY_RESOURCES_DIR and
        # sets TERMINFO to Contents/Resources/terminfo for child shells.
        script: |
          set -euo pipefail
          SRC_SHARE="${SRCROOT}/ghostty/zig-out/share"
          DEST_RESOURCES="${TARGET_BUILD_DIR}/${WRAPPER_NAME}/Contents/Resources"

          if [ ! -d "$SRC_SHARE/terminfo" ] || [ ! -d "$SRC_SHARE/ghostty" ]; then
            echo "error: Ghostty resources missing under $SRC_SHARE" >&2
            echo "run ./scripts/setup.sh to rebuild GhosttyKit.xcframework and resources" >&2
            exit 1
          fi

          rm -rf "$DEST_RESOURCES/terminfo" "$DEST_RESOURCES/ghostty"
          ditto "$SRC_SHARE/terminfo" "$DEST_RESOURCES/terminfo"
          ditto "$SRC_SHARE/ghostty" "$DEST_RESOURCES/ghostty"
        inputFiles:
          - $(SRCROOT)/ghostty/zig-out/share/terminfo/78/xterm-ghostty
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(WRAPPER_NAME)/Contents/Resources/terminfo/78/xterm-ghostty
