name: smoovmux
options:
  bundleIdPrefix: pw.dbu
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # Xcode 26 regression: the "Ld" task for SPM Swift modules (a partial
    # link that bundles a module's object files into one .o) builds a
    # clang-driver-style command line but invokes `ld` directly, which
    # rejects flags like `-isysroot`, `-iframework`, `-nostdlib`, and
    # `-fobjc-link-runtime`. Pointing LD at clang lets the driver translate
    # those into real ld flags. Remove once Apple fixes it.
    LD: $(TOOLCHAIN_DIR)/usr/bin/clang

packages:
  smoovmux-core:
    path: "."

targets:
  smoovmux:
    type: application
    platform: macOS
    sources:
      - path: App
    resources:
      - path: App/Assets.xcassets
      - path: App/Localizable.xcstrings
      # App/Resources/bin/ is copied into Contents/Resources/bin/ via the
      # postBuildScript below rather than a resources phase — xcodegen
      # 2.44 ignores `type: folder` and expands the directory into a
      # PBXGroup, which drops the `tmux` executable and `VERSION` from
      # the Resources build phase. Doing the copy explicitly also lets
      # the same phase drop `smoovmux-relay` next to them. See #22, #26.
    dependencies:
      - package: smoovmux-core
        product: TmuxCC
      - package: smoovmux-core
        product: SessionCore
      - package: smoovmux-core
        product: SmoovLog
      - package: smoovmux-core
        product: PaneRelay
      # Ensures the relay tool is built before the app; its binary is
      # dropped into Contents/Resources/bin/ by the post-build script
      # below. We don't embed it via Xcode's "Embed & Sign" because that
      # lands CLI tools under Contents/MacOS/, not a nested Resources dir.
      - target: smoovmux-relay
        embed: false
        link: false
      # GhosttyKit.xcframework's macOS slice is a static archive
      # (`ghostty-internal.a`). Static archives aren't embedded — the code
      # is linked into the app binary at build time. `embed: false` keeps
      # codesign from choking on a .a file in `Contents/Frameworks/`.
      - framework: GhosttyKit.xcframework
        embed: false
      # libghostty pulls in Carbon for TIS* keyboard-layout introspection.
      - sdk: Carbon.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pw.dbu.smoovmux
        PRODUCT_NAME: smoovmux
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/smoovmux.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        # ghostty-internal.a pulls in glslang (C++). Upstream's Ghostty.app
        # links libstdc++ explicitly — we need the same for libghostty's
        # shader compiler to find std::runtime_error et al.
        OTHER_LDFLAGS: -lstdc++
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)"
    postBuildScripts:
      - name: Embed Contents/Resources/bin
        # Populates the bundled `bin/` directory with the committed tmux
        # + VERSION from App/Resources/bin and the freshly-built
        # smoovmux-relay from $BUILT_PRODUCTS_DIR. The relay is ad-hoc
        # signed so it launches under hardened runtime locally; the
        # committed tmux is already ad-hoc signed by scripts/build-tmux.sh.
        # Release signing happens in the (future) release pipeline.
        # See #22, #26.
        script: |
          set -euo pipefail
          SRC_DIR="${SRCROOT}/App/Resources/bin"
          DEST_DIR="${TARGET_BUILD_DIR}/${WRAPPER_NAME}/Contents/Resources/bin"
          mkdir -p "$DEST_DIR"
          cp "$SRC_DIR/tmux" "$DEST_DIR/tmux"
          cp "$SRC_DIR/VERSION" "$DEST_DIR/VERSION"
          cp "${BUILT_PRODUCTS_DIR}/smoovmux-relay" "$DEST_DIR/smoovmux-relay"
          codesign --force --sign - "$DEST_DIR/smoovmux-relay"
        inputFiles:
          - $(SRCROOT)/App/Resources/bin/tmux
          - $(SRCROOT)/App/Resources/bin/VERSION
          - $(BUILT_PRODUCTS_DIR)/smoovmux-relay
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(WRAPPER_NAME)/Contents/Resources/bin/tmux
          - $(TARGET_BUILD_DIR)/$(WRAPPER_NAME)/Contents/Resources/bin/VERSION
          - $(TARGET_BUILD_DIR)/$(WRAPPER_NAME)/Contents/Resources/bin/smoovmux-relay

  smoovmux-relay:
    type: tool
    platform: macOS
    sources:
      - path: Sources/smoovmux-relay
    settings:
      base:
        PRODUCT_NAME: smoovmux-relay
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
        # Stand-alone CLI; no entitlements, no hardened runtime at build
        # time — the post-build copy into the app re-signs ad-hoc.
        ENABLE_HARDENED_RUNTIME: NO
