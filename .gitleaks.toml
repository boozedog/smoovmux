# gitleaks config for smoovmux.
# Extends the default ruleset; adds local allowlists for false positives.
# Docs: https://github.com/gitleaks/gitleaks#configuration

[extend]
useDefault = true

[allowlist]
description = "smoovmux false-positive allowlists"

paths = [
  '''^ghostty/''',                # submodule — upstream's problem, not ours
  '''^GhosttyKit\.xcframework/''',# build artifact
  '''^\.build/''',                # SPM
  '''DerivedData/''',
  '''^smoovmux\.xcodeproj/''',    # generated by xcodegen
  '''^Package\.resolved$''',
]

# Add per-rule allowlists here as we hit false positives, e.g. tmux fixture
# files containing strings that look like tokens.
